# 原作者：RuCu6
# 现作者：GitHub-YungHsin
# 重写链接：https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Rewrite/NCvip.conf

# 播放器会员皮肤
^https:\/\/interface3\.music\.163\.com\/eapi\/playermode\/ url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js

# 搜索结果会员歌曲
^https:\/\/interface3\.music\.163\.com\/eapi\/search\/complex\/(page|rec\/song\/get) url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js
# 播放器会员歌曲
^https:\/\/interface3\.music\.163\.com\/eapi\/song\/(chorus|enhance\/|type\/detail\/get) url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js
^https:\/\/interface3\.music\.163\.com\/eapi\/(v1\/artist\/top\/song|v3\/discovery\/recommend\/songs) url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js

# 侧边栏会员等级
^https:\/\/interface3\.music\.163\.com\/eapi\/vipnewcenter\/app\/resource\/newaccountpage url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js

# 首页歌单会员歌曲
^https?:\/\/interface3\.music\.163\.com\/eapi\/(homepage\/|v6\/)?playlist\/ url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js

# 会员认证
^https?:\/\/interface3\.music\.163\.com\/eapi\/vipauth\/app\/auth\/(soundquality\/)?query url script-request-header https://raw.githubusercontent.com/GitHub-YungHsin/QuantumultX/main/Scripts/NCvip.js

hostname = interface3.music.163.com
